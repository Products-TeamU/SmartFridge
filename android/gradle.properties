# Настройки памяти (самое важное!)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=2048m

# Параллельная сборка (ускоряет)
org.gradle.parallel=true

# Поддержка AndroidX (обязательно)
android.useAndroidX=true

# Отключаем новую архитектуру (для совместимости)
newArchEnabled=false

# Включаем Hermes (если используешь)
hermesEnabled=true
