name: Build Android APK

on:
  push:
    branches: [ main, Frontend ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Принудительно устанавливаем параметры памяти для Gradle и Java
      - name: Set Gradle memory options
        run: |
          echo "GRADLE_OPTS=-Xmx6g -XX:MaxMetaspaceSize=3g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true" >> $GITHUB_ENV
          echo "JAVA_OPTS=-Xmx6g -XX:MaxMetaspaceSize=3g" >> $GITHUB_ENV

      # Проверяем, что настройки применились
      - name: Check memory settings
        run: |
          echo "GRADLE_OPTS: $GRADLE_OPTS"
          echo "JAVA_OPTS: $JAVA_OPTS"
          java -XX:+PrintFlagsFinal -version | grep -E "MaxHeapSize|MaxMetaspaceSize"

      # 👇 Кэшируем Gradle, чтобы ускорить последующие сборки
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Prebuild (generate android folder)
        run: npx expo prebuild --clean

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/my-release-key.jks

      - name: Create gradle.properties with passwords
        run: |
          echo "MYAPP_RELEASE_STORE_FILE=my-release-key.jks" >> android/gradle.properties
          echo "MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      # Для диагностики выводим содержимое gradle.properties
      - name: Check gradle.properties
        run: cat android/gradle.properties || echo "gradle.properties not found"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=3g" \
            -Dkotlin.daemon.jvmargs="-Xmx2g" \
            --no-daemon \
            --max-workers=2

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
